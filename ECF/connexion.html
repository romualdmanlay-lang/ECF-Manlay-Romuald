<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <img class="logo" src="css/images/logo.jpg" alt="logo de l'entreprise">
        <h1 class="titre"> "Vite & Gourmand" </h1>
        <nav>
            <ul class="liste">
                <li class="element-liste">
                    <a href="index.html">Accueil</a></li>
                <li class="element-liste">
                    <a href="contact.html">Contact</a></li>
                <li class="element-liste">
                    <a href="menus.html">Menus</a></li>
                <li class="element-liste">
                    <a href="connexion.html">Connexion</a></li>
            </ul>
    </header>
    <main>
        <div class="connexion">
            <h2 class="titre-connexion"> Connectez-vous à votre compte </h2>
            <form class="formulaire-connexion">
                <div>
                    <label class="label-connexion" for="email">Votre mail</label>
                    <input class="input-connexion" type="email" id="email" placeholder=" Entrez votre adresse mail">
                </div>
                <div>
                    <label class="label-connexion" for="password">Votre mot de passe</label>
                    <input class="input-connexion" type="password" id="password" placeholder=" Entrez votre mot de passe">
                </div>
                <button class="button-connexion" type="submit">Se connecter</button>
                <button class="button-mot-de-passe" type="submit">Mot de passe oublié?</button>
            </form>
        </div>
    </main>
    <footer class="footer">
        <img class="label" src="css/images/label.png" alt="label de qualité">
        <div class="horaires">
            <p class="titre-horaires">horaires:</p>
            <p class="heures">du lundi au dimanche</p>
            <p class="heures">de 8H à 18H</p>
        </div>
        <nav>
            <ul class="nav-footer">
                <li >
                    <a href="">mention légales</a>
                </li>
                <li >
                    <a class="conditions" href="">condition générales de vente</a>
                </li>
            </ul>
        </nav>
    </footer>
    <script src="./js/script.js"></script>
</body>
</html>
